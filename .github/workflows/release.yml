name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.0.0)'
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - arch: x86_64
            os: linux
          - arch: aarch64
            os: linux
          - arch: armv7l
            os: linux

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y g++ libncursesw5-dev

      - name: Build
        run: make release

      - name: Package
        run: |
          cd bin
          tar czf tupac-${{ matrix.os }}-${{ matrix.arch }}.tar.gz tupac

      - name: Determine tag
        id: tag
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "TUPAC ${{ steps.tag.outputs.tag }}"
          files: |
            bin/tupac-${{ matrix.os }}-${{ matrix.arch }}.tar.gz
